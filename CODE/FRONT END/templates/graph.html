{% extends 'home.html' %}

{% block content %}

    <div class="content-container" style="position: relative; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center;">
        <!-- Centered Box Containing the Button and Image List -->
        <div id="imageBox" class="image-box" 
            style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                   padding: 20px; border: 2px solid #ddd; border-radius: 8px;
                   box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); width: 100%;
                   max-width: 400px; display: flex; flex-direction: column;
                   justify-content: center; align-items: center; background-color: white;">
            
            <button id="showImagesBtn" onclick="toggleImageList()" 
                style="background-color: #4CAF50; color: white; padding: 15px 32px;
                       font-size: 16px; border: none; border-radius: 5px;
                       cursor: pointer; transition: background-color 0.3s;">
                Show Image Names
            </button>

            <div id="imageList" class="image-list" style="display: none; margin-top: 20px; text-align: center;">
                <button onclick="showImage('static/outputs/Dtc_con.png')" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px; font-size: 14px; margin: 5px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;">DTC confusion matrix</button>
                <button onclick="showImage('static/outputs/feature_imp.png')" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px; font-size: 14px; margin: 5px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;">Feature importance</button>
                <button onclick="showImage('static/outputs/logistic_con.png')" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px; font-size: 14px; margin: 5px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;">Logistic regression confusion matrix</button>
                <button onclick="showImage('static/outputs/rf_con.png')" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px; font-size: 14px; margin: 5px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;">Random forest confusion matrix</button>
                <button onclick="showImage('static/outputs/ROC and AUC for all models.png')" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px; font-size: 14px; margin: 5px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;">ROC and AUC for all models</button>
                <button onclick="showImage('static/outputs/accuracy_of_all_models.png')" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px; font-size: 14px; margin: 5px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;">Accuracy for all models</button>
                <button onclick="showImage('static/outputs/stack_con.png')" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px; font-size: 14px; margin: 5px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;">Stacking classifier confusion matrix</button>
            </div>
        </div>
    
        <!-- Placeholder for the image -->
        <div id="imageContainer" class="image-container" style="display: flex; flex-direction: row; justify-content: center; align-items: center; margin-top: 20px; max-width: 80%;">
            <!-- Modal for showing the image -->
            <div id="imageModal" class="modal" style="display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); justify-content: center; align-items: center;">
                <div class="modal-content" style="background-color: white; padding: 20px; border-radius: 10px; position: relative; max-width: 80%; max-height: 80%; display: flex; justify-content: center; align-items: center;">
                    <span id="closeModal" onclick="closeModal()" style="position: absolute; top: 10px; right: 20px; font-size: 25px; font-weight: bold; color: #aaa; cursor: pointer;">&times;</span>
                    <img id="selectedImage" src="" alt="Selected Image" style="max-width: 100%; max-height: 100%; object-fit: contain; border: 2px solid #ddd; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);" />
                    <button id="removeImageBtn" onclick="removeImage()" style="background-color: #f44336; color: white; padding: 10px 20px; font-size: 14px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; transition: background-color 0.3s;">Remove Image</button>
                </div>
            </div>
        </div>

        <!-- Popup message for image selection -->
        <div id="popupMessage" class="popup-message" style="position: fixed; top: 0; left: 50%; transform: translateX(-50%); background-color: #4CAF50; color: white; padding: 10px 20px; border-radius: 5px; font-size: 16px; display: none; z-index: 9999;">
            Image selected!
        </div>

    </div>

    <script>
    // Function to toggle the visibility of the image names list
    function toggleImageList() {
        const imageList = document.getElementById('imageList');
        imageList.style.display = imageList.style.display === 'none' ? 'block' : 'none';
    }
    
    // Function to display the clicked image in the modal and show the popup message
    function showImage(imagePath) {
        const modal = document.getElementById('imageModal');
        const selectedImage = document.getElementById('selectedImage');
        const popupMessage = document.getElementById('popupMessage');
        
        selectedImage.src = imagePath;
        modal.style.display = 'flex';

        // Show popup message
        popupMessage.style.display = 'block';

        // Hide popup message after 3 seconds
        setTimeout(() => {
            popupMessage.style.display = 'none';
        }, 3000);
    }

    // Function to close the modal
    function closeModal() {
        const modal = document.getElementById('imageModal');
        modal.style.display = 'none';
    }

    // Function to remove the image and close the modal
    function removeImage() {
        const modal = document.getElementById('imageModal');
        const selectedImage = document.getElementById('selectedImage');
        selectedImage.src = '';  // Remove the image source
        modal.style.display = 'none';  // Close the modal
    }
    </script>

{% endblock %}
