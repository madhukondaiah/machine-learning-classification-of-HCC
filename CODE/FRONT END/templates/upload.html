{% extends 'home.html' %}


{% block content %}
<!-- Booking Start -->
<div class="container-xxl py-5 wow fadeInUp" data-wow-delay="0.1s">
    <div class="container" style="min-height: 100%;margin-top: 70px; height: 500px;width: 2000px;">
        <div class="booking1 p-5">
            <div class="row g-5 align-items-center">
                <div class="col-md-6">
                    {% if df %}
                    <center><label for="data">
                            <h3>Dataset</h3>
                        </label></center>
                    <div
                        style="color: rgb(255, 255, 255); margin-top: 0px; height: 300px; width: 100%; overflow: auto;">
                        {{df | safe}}
                    </div>
                    {% endif %}
                </div>

                <div class="col-md-6" style="margin-top: 130px;">
                    <h1 class="text-white mb-4">Upload dataset </h1>
                    <form action="{{url_for('upload')}}" method="post" enctype="multipart/form-data">
                        <div class="row g-3">

                            <div class="col-md-12">
                                <div class="form-floating">
                                    <input type="file" style="border-radius: 20px;" class="form-control bg-transparent"
                                        id="file" name="file" required placeholder="add file">
                                    <label for="file">Your file</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <button class="btn btn-outline-light w-100 py-3" type="submit">upload Now</button>
                            </div>
                        </div>
                    </form>
                </div>
                </center>
            </div>
        </div>
    </div>
</div>
</div>
</div>
</div>
{% endblock %}
{% if message %}
<script>
    alert("{{message}}")
</script>
{% endif %}
